<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skin Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="fav-sidebar">
    <div class="fav-header" onclick="toggleSidebar()" title="Close favorites">
      <span class="fav-title">★ Favorites</span>
    </div>
    <div class="fav-list" id="fav-list"></div>
  </aside>

  <button class="fav-open-btn" id="fav-toggle-btn" onclick="toggleSidebar()" title="Favorites">☆</button>

  <header>
    <div class="logo">skin<span>.</span>lookup</div>
    <div class="tagline">Minecraft Java Edition · Player Skin Viewer</div>
  </header>

  <main>
    <div class="top-wrap">
    <div class="search-wrap">
      <input type="text" id="username" placeholder="Enter player name..." autocomplete="off" />
      <button id="search-btn" onclick="lookup()">Look up</button>
    </div>
    <div class="default-skins-wrap">
      <span class="default-skins-label">or load default:</span>
      <button class="btn" onclick="loadDefaultSkin('steve')">Steve</button>
      <button class="btn" onclick="loadDefaultSkin('alex')">Alex</button>
      <button class="btn" id="upload-btn" onclick="$('skin-upload-input').click()" style="display:none">↑ Upload</button>
      <input type="file" id="skin-upload-input" accept=".png" style="display:none" onchange="handleUpload(event)" />
    </div>

    <div class="error" id="error"></div>

    <div class="loader" id="loader">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>

    <!--  Result card  -->
    <div id="result">
      <div class="result-header">
        <img class="result-avatar" id="avatar-img" src="" alt="" onerror="this.style.display='none'" onload="this.style.display=''" />
        <div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="result-name" id="result-name"></div>
            <span class="model-badge" id="model-badge"></span>
          </div>
          <div class="result-uuid" id="result-uuid"></div>
        </div>
      </div>
      <div class="result-body">
        <div class="skin-block">
          <div class="skin-label">Skin</div>
          <div class="skin-frame">
            <img class="skin-img full" id="skin-img" src="" alt="skin" />
          </div>
        </div>
        <div class="skin-block" id="cape-block">
          <div class="skin-label">Cape</div>
          <div class="skin-frame">
            <img class="skin-img cape" id="cape-img" src="" alt="cape" />
          </div>
        </div>
        <div class="skin-block" id="no-cape-block" style="display:none">
          <div class="skin-label">Cape</div>
          <div class="skin-frame"><div class="no-cape">No cape</div></div>
        </div>
      </div>
      <div class="dl-row">
        <a class="btn" id="dl-skin" download>↓ Download skin</a>
        <a class="btn" id="dl-cape" download style="display:none">↓ Download cape</a>
        <button class="btn" id="fav-btn" onclick="toggleFavorite()">☆ Save</button>
        <button class="btn btn-accent" id="edit-btn" onclick="openEditor()">✏ Edit skin</button>
      </div>
    </div>
    </div><!-- /.top-wrap -->

    <div id="panels-wrap">
    <!--  Editor  -->
    <div id="editor">
      <div class="editor-header">
        <span class="editor-title">SKIN EDITOR</span>
        <span class="model-badge" id="editor-model-badge"></span>
        <span class="format-badge" id="format-badge" style="display:none">64×32 · Legacy</span>
        <div style="display:flex;gap:8px;">
          <button class="btn" onclick="resetCanvas()">↺ Reset</button>
          <button class="btn" onclick="closeEditor()">✕ Close</button>
        </div>
      </div>

      <div class="toolbar">
        <button class="tool-btn" id="btn-undo" onclick="undo()" disabled>↩ Undo</button>
        <button class="tool-btn" id="btn-redo" onclick="redo()" disabled>↪ Redo</button>
        <div class="toolbar-sep"></div>
        <button class="tool-btn active" id="tool-pencil" onclick="setTool('pencil')">✏ Pencil</button>
        <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')">◻ Eraser</button>
        <button class="tool-btn" id="tool-eyedropper" onclick="setTool('eyedropper')">✦ Pick</button>
        <div class="toolbar-sep"></div>
        <div class="color-wrap">
          <input type="color" id="color-input" value="#ffffff" oninput="updateColor()" />
          <div class="color-preview" id="color-preview" style="background:#ffffff"></div>
        </div>
        <div class="toolbar-sep"></div>
        <div class="size-wrap">
          <label for="brush-size">Size</label>
          <input type="range" id="brush-size" min="1" max="8" value="1" step="1" oninput="updateBrushSize()" />
          <span id="size-val">1</span>
        </div>
        <div class="toolbar-sep"></div>
        <button class="tool-btn" id="grid-toggle" onclick="toggleGrid()">⊞ Grid</button>
        <button class="tool-btn" id="region-toggle" onclick="toggleRegions()">⬚ Regions</button>
      </div>

      <div class="canvas-wrap">
        <div class="canvas-container">
          <canvas id="skin-canvas" width="512" height="512"></canvas>
          <canvas id="grid-canvas" width="512" height="512" style="display:none"></canvas>
          <canvas id="region-canvas" width="512" height="512" style="display:none"></canvas>
        </div>
      </div>

      <div class="editor-footer">
        <button class="btn btn-accent" onclick="downloadEdited()">↓ Download edited skin</button>
        <span class="coords" id="coords">—</span>
      </div>
    </div>

    <!--    3D Viewer  -->
    <div id="viewer-3d" style="display:none">
      <div class="editor-header">
        <span class="editor-title">3D VIEWER</span>
        <span class="model-badge" id="viewer-3d-model-badge"></span>
      </div>
      <div class="viewer-3d-body">
        <canvas id="skin-3d-canvas"></canvas>
      </div>
      <div class="viewer-3d-controls">
        <div class="anim-btns">
          <span class="default-skins-label">Anim:</span>
          <button class="tool-btn active" id="anim-btn-idle"   onclick="setAnimation('idle')">Idle</button>
          <button class="tool-btn"        id="anim-btn-walk"   onclick="setAnimation('walk')">Walk</button>
          <button class="tool-btn"        id="anim-btn-run"    onclick="setAnimation('run')">Run</button>
          <button class="tool-btn"        id="anim-btn-wave"   onclick="setAnimation('wave')">Wave</button>
          <button class="tool-btn"        id="anim-btn-fly"    onclick="setAnimation('fly')">Fly</button>
          <button class="tool-btn"        id="anim-btn-swim"   onclick="setAnimation('swim')">Swim</button>
          <button class="tool-btn"        id="anim-btn-crouch" onclick="setAnimation('crouch')">Crouch</button>
          <button class="tool-btn"        id="anim-btn-hit"    onclick="setAnimation('hit')">Hit</button>
          <button class="tool-btn"        id="anim-btn-none"   onclick="setAnimation('none')">None</button>
        </div>
        <div class="back-toggles" id="back-toggles" style="display:none">
          <span class="default-skins-label">Back:</span>
          <button class="tool-btn active" id="back-cape"   onclick="toggle3DBack('cape')">Cape</button>
          <button class="tool-btn"        id="back-elytra" onclick="toggle3DBack('elytra')">Elytra</button>
          <button class="tool-btn"        id="back-off"    onclick="toggle3DBack('off')">Off</button>
        </div>
      </div>
    </div>
    </div><!-- /#panels-wrap -->
  </main>

  <footer>
    <a href="https://github.com/Electroid/mojang-api" target="_blank" rel="noopener">Player data via api.ashcon.app</a>
    <a href="https://help.minecraft.net/hc/en-us/articles/4408894664461-Minecraft-Java-Edition-Skins" target="_blank" rel="noopener">How to upload your skin ↗</a>
    <a href="#" target="_blank" rel="noopener">View source</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.bundle.js"></script>
  <script src="script.js"></script>
</body>
</html>
